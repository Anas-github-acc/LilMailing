name: Schedule Send Mails

on:
  schedule:
    # - cron: "*/5 * * * *"

    # 10:03–10:48 IST
    - cron: "33,48 4 * * 1-4"

    # 11:03–14:48 IST (irregular spacing)
    - cron: "3,21,37,52 5 * * 1-4"
    - cron: "6,24,41,57 6 * * 1-4"
    - cron: "2,19,36,54 7 * * 1-4"
    - cron: "8,26,43,59 8 * * 1-4"
    - cron: "4,22,39,55 9 * * 1-4"

    # Final block
    - cron: "3,18,33 10 * * 1-4"
  workflow_dispatch:

jobs:
  send-mails:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: lilmailing-send-mails
      cancel-in-progress: false
    env:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      IMAP_HOST: ${{ secrets.IMAP_HOST }}
      IMAP_PORT: ${{ secrets.IMAP_PORT }}
      RESUME_PATH: ${{ secrets.RESUME_PATH }}
      RESUME_FILENAME: ${{ secrets.RESUME_FILENAME }}
      JOB_SEND_MAX_PER_RUN: "1"
      SEND_DELAY_MS: "0"
      REPLY_LOOKBACK_DAYS: ${{ secrets.REPLY_LOOKBACK_DAYS }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
      GOOGLE_AI_MODEL: ${{ secrets.GOOGLE_AI_MODEL }}
      LIVE: ${{ secrets.LIVE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run send job
        run: pnpm job:send
