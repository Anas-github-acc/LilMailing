name: Schedule Read Replies

on:
  schedule:
    # Every 20 minutes, Monday-Thursday
    - cron: 02, 9 * * * 
    # - cron: "33 2 * * *"
  workflow_dispatch:

jobs:
  read-replies:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: lilmailing-read-replies
      cancel-in-progress: false
    env:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      IMAP_HOST: ${{ secrets.IMAP_HOST }}
      IMAP_PORT: ${{ secrets.IMAP_PORT }}
      RESUME_PATH: ${{ secrets.RESUME_PATH }}
      RESUME_FILENAME: ${{ secrets.RESUME_FILENAME }}
      SEND_DELAY_MS: ${{ secrets.SEND_DELAY_MS }}
      REPLY_LOOKBACK_DAYS: ${{ secrets.REPLY_LOOKBACK_DAYS }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
      GOOGLE_AI_MODEL: ${{ secrets.GOOGLE_AI_MODEL }}
      LIVE: ${{ secrets.LIVE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run reply reader job
        run: pnpm job:read
